<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef } = React;

const API_URL = "https://script.google.com/macros/s/AKfycbzTM1kLLFvkjhiPXwZfTT3KM9QRJAR_GvtKKj07VqA1xOvk6pRqG2XPeTJv6leyd85k/exec";

const ACQUISITION_CATEGORIES = ["Down Payment","Closing Costs","Loan Expenses"];
const REHAB_CATEGORIES = ["Labor","Demo/Cleanup","Materials","Permits","Utilities","Equipment","Professional Fees","Other"];
const CATEGORIES = [...ACQUISITION_CATEGORIES,...REHAB_CATEGORIES];
const CATEGORY_COLORS = {
  "Down Payment":"#f97316","Closing Costs":"#06b6d4","Loan Expenses":"#a78bfa",
  "Labor":"#6366f1","Demo/Cleanup":"#e11d48","Materials":"#f59e0b",
  "Permits":"#10b981","Utilities":"#3b82f6","Equipment":"#ef4444",
  "Professional Fees":"#8b5cf6","Other":"#6b7280"
};

const TASK_STATUSES = ["To Do","In Progress","Blocked","Done"];
const TASK_STATUS_COLORS = {"To Do":"#6b7280","In Progress":"#f59e0b","Blocked":"#ef4444","Done":"#10b981"};
const ASSIGNEES = ["Me","Partner","Contractor","Other"];
const TASK_CATEGORIES = ["Financing","Reno","Admin","Inspection","Legal","Other"];
const PRIORITIES = ["High","Med","Low"];
const PRIORITY_COLORS = {"High":"#ef4444","Med":"#f59e0b","Low":"#6b7280"};
const QUOTE_STATUSES = ["Pending","Accepted","Rejected"];
const QUOTE_STATUS_COLORS = {"Pending":"#f59e0b","Accepted":"#10b981","Rejected":"#ef4444"};

const fmt     = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n||0);
const fmtDate = d => d ? new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "";
const fmtDateShort = d => d ? new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "";
const genId   = () => Math.random().toString(36).slice(2,10);

let SESSION_PIN = "";

async function api(action, extra={}) {
  const res = await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({pin:SESSION_PIN, action, ...extra})
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

const S = {
  root:     {minHeight:"100%",background:"#0a1628",color:"#e2e8f0",display:"flex",flexDirection:"column"},
  header:   {background:"#0d1f3c",borderBottom:"1px solid #1e3a5f",padding:"0 20px",display:"flex",alignItems:"center",gap:12,height:56,position:"sticky",top:0,zIndex:20,flexShrink:0},
  sidebar:  {width:220,background:"#0d1f3c",borderRight:"1px solid #1e3a5f",padding:"16px 0",display:"flex",flexDirection:"column",height:"calc(100vh - 56px)",position:"sticky",top:56,overflowY:"auto",flexShrink:0},
  sideLabel:{fontSize:10,fontWeight:700,color:"#4a6fa5",letterSpacing:"0.1em",textTransform:"uppercase",padding:"0 16px 6px"},
  sideItem: a=>({padding:"9px 16px",cursor:"pointer",fontSize:13,color:a?"#f8f0d8":"#7a9cc5",background:a?"#1e3a5f":"transparent",borderLeft:a?"2px solid #d4a017":"2px solid transparent",display:"flex",alignItems:"center",gap:8,transition:"all .15s",userSelect:"none"}),
  content:  {flex:1,padding:24,overflowY:"auto",minHeight:0},
  card:     {background:"#0d1f3c",border:"1px solid #1e3a5f",borderRadius:10,padding:"18px 20px"},
  btn:      (v="primary")=>({padding:"9px 16px",borderRadius:8,fontSize:13,fontWeight:600,border:"none",
    background:v==="primary"?"#d4a017":v==="danger"?"#ef444422":v==="ghost"?"#1e3a5f":"#1e3a5f",
    color:v==="danger"?"#ef4444":v==="ghost"?"#7a9cc5":"#0a1628",
    cursor:"pointer"
  }),
  input:    {background:"#071020",border:"1px solid #1e3a5f",borderRadius:7,padding:"10px 12px",color:"#e2e8f0",fontSize:14,width:"100%",outline:"none"},
  label:    {fontSize:11,color:"#4a6fa5",fontWeight:700,marginBottom:5,display:"block",textTransform:"uppercase",letterSpacing:"0.06em"},
  th:       {padding:"10px 12px",fontSize:11,fontWeight:700,color:"#4a6fa5",textTransform:"uppercase",letterSpacing:"0.06em",textAlign:"left",borderBottom:"1px solid #1e3a5f"},
  td:       {padding:"12px 12px",fontSize:13,color:"#cbd5e1",borderBottom:"1px solid #071020",verticalAlign:"middle"},
  badge:    cat=>({background:(CATEGORY_COLORS[cat]||"#6b7280")+"22",color:CATEGORY_COLORS[cat]||"#6b7280",padding:"3px 9px",borderRadius:99,fontSize:11,fontWeight:600,whiteSpace:"nowrap"}),
};

// ── PIN SCREEN ───────────────────────────────────────────────────────────
function PinScreen({onUnlock}) {
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  const [checking,setChecking]=useState(false);
  const check=async()=>{
    if(!pin)return;
    setChecking(true);
    try{
      const res=await fetch(API_URL,{method:"POST",body:JSON.stringify({pin,action:"getProjects"})});
      const data=await res.json();
      if(data.error==="Unauthorized"){setErr(true);setPin("");}
      else onUnlock(pin);
    }catch(e){setErr(true);}
    setChecking(false);
  };
  return React.createElement("div",{style:{minHeight:"100vh",background:"#0a1628",display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
    React.createElement("div",{style:{background:"#0d1f3c",border:"1px solid #1e3a5f",borderRadius:16,padding:"40px 36px",textAlign:"center",width:"100%",maxWidth:340}},
      React.createElement("div",{style:{fontSize:36,marginBottom:12}},"🏗️"),
      React.createElement("div",{style:{fontWeight:800,fontSize:20,color:"#f8f0d8",marginBottom:4,letterSpacing:"-0.5px"}},"NextPhase Ventures"),
      React.createElement("div",{style:{fontSize:13,color:"#4a6fa5",marginBottom:28}},"Enter PIN to continue"),
      React.createElement("input",{type:"password",maxLength:6,placeholder:"••••",value:pin,autoFocus:true,
        style:{...S.input,fontSize:28,textAlign:"center",letterSpacing:10,padding:14,marginBottom:err?8:16,border:err?"1px solid #ef4444":"1px solid #1e3a5f"},
        onChange:ev=>{setPin(ev.target.value);setErr(false);},
        onKeyDown:ev=>ev.key==="Enter"&&check()
      }),
      err&&React.createElement("div",{style:{fontSize:12,color:"#ef4444",marginBottom:12}},"Incorrect PIN."),
      React.createElement("button",{style:{...S.btn(),width:"100%",padding:13,fontSize:15},onClick:check,disabled:checking},checking?"Checking…":"Unlock")
    )
  );
}

// ── APP ──────────────────────────────────────────────────────────────────
function App() {
  const [authed,setAuthed]         = useState(()=>{try{return sessionStorage.getItem("npv-auth")==="ok"}catch{return false}});
  const [projects,setProjects]     = useState([]);
  const [activeId,setActiveId]     = useState(null);
  const [expenses,setExpenses]     = useState([]);
  const [loading,setLoading]       = useState(true);
  const [loadingExp,setLoadingExp] = useState(false);
  const [saving,setSaving]         = useState(false);
  const [view,setView]             = useState("home");
  const [form,setForm]             = useState({});
  const [filter,setFilter]         = useState({category:"",search:""});
  const [toast,setToast]           = useState(null);
  const [delConfirm,setDelConfirm] = useState(null);
  const [error,setError]           = useState(null);
  const [tasks,setTasks]           = useState([]);
  const [loadingTasks,setLoadingTasks] = useState(false);
  const [taskFilter,setTaskFilter] = useState("");
  const [quotes,setQuotes]         = useState([]);
  const [loadingQuotes,setLoadingQuotes] = useState(false);
  const [quoteGroupFilter,setQuoteGroupFilter] = useState("");

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
  const unlock=(pin)=>{SESSION_PIN=pin;try{sessionStorage.setItem("npv-auth","ok");sessionStorage.setItem("npv-pin",pin);}catch{}setAuthed(true);};

  useEffect(()=>{
    if(authed){try{const p=sessionStorage.getItem("npv-pin");if(p)SESSION_PIN=p;}catch{}}
  },[authed]);

  useEffect(()=>{
    if(!authed)return;
    setLoading(true);
    api("getProjects").then(async data=>{
      let projs=data.projects||[];
      if(projs.length===0){await api("seedLincoln");const d2=await api("getProjects");projs=d2.projects||[];}
      setProjects(projs);
      if(projs.length>0)setActiveId(projs[0].id);
      setError(null);
    }).catch(e=>setError(e.message)).finally(()=>setLoading(false));
  },[authed]);

  useEffect(()=>{
    if(!activeId)return;
    setLoadingExp(true);
    api("getExpenses",{projectId:activeId})
      .then(data=>setExpenses(data.expenses||[]))
      .catch(e=>showToast("Failed to load expenses","error"))
      .finally(()=>setLoadingExp(false));
  },[activeId]);

  useEffect(()=>{
    if(!activeId)return;
    setLoadingTasks(true);
    api("getTasks",{projectId:activeId})
      .then(data=>setTasks(data.tasks||[]))
      .catch(e=>{})
      .finally(()=>setLoadingTasks(false));
  },[activeId]);

  useEffect(()=>{
    if(!activeId)return;
    setLoadingQuotes(true);
    api("getQuotes",{projectId:activeId})
      .then(data=>setQuotes(data.quotes||[]))
      .catch(e=>{})
      .finally(()=>setLoadingQuotes(false));
  },[activeId]);

  const activeProject=projects.find(p=>String(p.id)===String(activeId))||null;

  const saveExpense=async()=>{
    if(!form.description||!form.amount||!form.date){showToast("Fill in all required fields.","error");return;}
    const amount=parseFloat(form.amount);
    if(isNaN(amount)||amount<=0){showToast("Enter a valid amount.","error");return;}
    setSaving(true);
    try{
      if(form.id){
        await api("updateExpense",{projectId:activeId,expense:{...form,amount}});
        setExpenses(prev=>prev.map(e=>e.id===form.id?{...form,amount}:e));
        showToast("Expense updated.");
      } else {
        const newExp={...form,id:genId(),amount};
        await api("addExpense",{projectId:activeId,expense:newExp});
        setExpenses(prev=>[...prev,newExp]);
        showToast("Expense added.");
      }
      setView("expenses");
    }catch(e){showToast("Save failed: "+e.message,"error");}
    setSaving(false);
  };

  const deleteExpense=async id=>{
    setSaving(true);
    try{
      await api("deleteExpense",{projectId:activeId,expenseId:id});
      setExpenses(prev=>prev.filter(e=>e.id!==id));
      showToast("Expense deleted.");
    }catch(e){showToast("Delete failed","error");}
    setDelConfirm(null);setSaving(false);
  };

  const saveTask=async()=>{
    if(!form.task){showToast("Task name is required.","error");return;}
    setSaving(true);
    try{
      if(form.id){
        await api("updateTask",{projectId:activeId,task:form});
        setTasks(prev=>prev.map(t=>t.id===form.id?{...form}:t));
        showToast("Task updated.");
      } else {
        const newTask={...form,id:genId(),status:form.status||"To Do"};
        await api("addTask",{projectId:activeId,task:newTask});
        setTasks(prev=>[...prev,newTask]);
        showToast("Task added.");
      }
      setView("tasks");
    }catch(e){showToast("Save failed: "+e.message,"error");}
    setSaving(false);
  };

  const deleteTask=async id=>{
    setSaving(true);
    try{
      await api("deleteTask",{projectId:activeId,taskId:id});
      setTasks(prev=>prev.filter(t=>t.id!==id));
      showToast("Task deleted.");
    }catch(e){showToast("Delete failed","error");}
    setDelConfirm(null);setSaving(false);
  };

  const cycleStatus=async(task)=>{
    const idx=TASK_STATUSES.indexOf(task.status||"To Do");
    const next=TASK_STATUSES[(idx+1)%TASK_STATUSES.length];
    const updated={...task,status:next};
    setTasks(prev=>prev.map(t=>t.id===task.id?updated:t));
    try{ await api("updateTask",{projectId:activeId,task:updated}); }
    catch(e){ showToast("Failed to update status","error"); }
  };

  const saveQuote=async()=>{
    if(!form.item||!form.vendor||!form.amount){showToast("Item, vendor, and amount are required.","error");return;}
    const amount=parseFloat(form.amount);
    if(isNaN(amount)||amount<=0){showToast("Enter a valid amount.","error");return;}
    setSaving(true);
    try{
      if(form.id){
        await api("updateQuote",{projectId:activeId,quote:{...form,amount}});
        setQuotes(prev=>prev.map(q=>q.id===form.id?{...form,amount}:q));
        showToast("Quote updated.");
      } else {
        const newQuote={...form,id:genId(),amount,status:"Pending"};
        await api("addQuote",{projectId:activeId,quote:newQuote});
        setQuotes(prev=>[...prev,newQuote]);
        showToast("Quote added.");
      }
      setView("quotes");
    }catch(e){showToast("Save failed: "+e.message,"error");}
    setSaving(false);
  };

  const deleteQuote=async id=>{
    setSaving(true);
    try{
      await api("deleteQuote",{projectId:activeId,quoteId:id});
      setQuotes(prev=>prev.filter(q=>q.id!==id));
      showToast("Quote deleted.");
    }catch(e){showToast("Delete failed","error");}
    setDelConfirm(null);setSaving(false);
  };

  const acceptQuote=async(quote)=>{
    setSaving(true);
    try{
      await api("acceptQuote",{projectId:activeId,quoteId:quote.id});
      setQuotes(prev=>prev.map(q=>{
        if(q.id===quote.id) return {...q,status:"Accepted"};
        if(q.item===quote.item && q.status==="Pending") return {...q,status:"Rejected"};
        return q;
      }));
      const newExp={id:"qte-"+quote.id,description:quote.item,amount:quote.amount,date:new Date().toISOString().slice(0,10),category:quote.category||"Materials",vendor:quote.vendor,notes:"Converted from accepted quote"};
      setExpenses(prev=>[...prev,newExp]);
      showToast("Quote accepted and added to expenses.");
    }catch(e){showToast("Failed: "+e.message,"error");}
    setSaving(false);
  };

  const rejectQuote=async(quote)=>{
    setSaving(true);
    try{
      const updated={...quote,status:"Rejected"};
      await api("updateQuote",{projectId:activeId,quote:updated});
      setQuotes(prev=>prev.map(q=>q.id===quote.id?updated:q));
      showToast("Quote rejected.");
    }catch(e){showToast("Failed","error");}
    setSaving(false);
  };

  const saveProject=async()=>{
    if(!form.name){showToast("Project name is required.","error");return;}
    setSaving(true);
    try{
      const pp=parseFloat(form.purchasePrice)||0;
      const rb=parseFloat(form.rehabBudget)||0;
      if(form.id){
        await api("updateProject",{project:{...form,purchasePrice:pp,rehabBudget:rb}});
        setProjects(prev=>prev.map(p=>p.id===form.id?{...form,purchasePrice:pp,rehabBudget:rb}:p));
        showToast("Project updated.");setView("dashboard");
      } else {
        const newP={id:genId(),name:form.name,purchasePrice:pp,rehabBudget:rb,description:form.description||""};
        await api("addProject",{project:newP});
        setProjects(prev=>[...prev,newP]);
        setActiveId(newP.id);setExpenses([]);
        showToast("Project created.");setView("dashboard");
      }
    }catch(e){showToast("Save failed: "+e.message,"error");}
    setSaving(false);
  };

  const deleteProject=async id=>{
    setSaving(true);
    try{
      await api("deleteProject",{projectId:id});
      const rem=projects.filter(p=>p.id!==id);
      setProjects(rem);
      if(activeId===id){setActiveId(rem[0]?.id||null);setExpenses([]);}
      showToast("Project deleted.");
      setDelConfirm(null);
      setView(rem.length>0?"dashboard":"home");
    }catch(e){showToast("Delete failed","error");}
    setSaving(false);
  };

  const openAddExpense=(expense=null)=>{
    setForm(expense?{...expense}:{date:new Date().toISOString().slice(0,10),category:CATEGORIES[0]});
    setView("add-expense");
  };

  const openAddTask=(task=null)=>{
    setForm(task?{...task}:{status:"To Do",assignee:ASSIGNEES[0],dueDate:"",notes:"",category:TASK_CATEGORIES[0],priority:"Med"});
    setView("add-task");
  };

  const openAddQuote=(quote=null)=>{
    setForm(quote?{...quote}:{category:REHAB_CATEGORIES[0],status:"Pending",item:quoteGroupFilter||""});
    setView("add-quote");
  };

  const navTo=(v)=>{setView(v);window.scrollTo(0,0);};

  if(!authed) return React.createElement(PinScreen,{onUnlock:unlock});

  const e=React.createElement;

  if(loading) return e("div",{style:{minHeight:"100vh",background:"#0a1628",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}},
    e("div",{style:{fontSize:28}},"⏳"),
    e("div",{style:{color:"#4a6fa5",fontSize:14}},"Connecting…")
  );

  if(error) return e("div",{style:{minHeight:"100vh",background:"#0a1628",display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
    e("div",{style:{...S.card,maxWidth:360,width:"100%",textAlign:"center"}},
      e("div",{style:{fontSize:28,marginBottom:12}},"⚠️"),
      e("div",{style:{fontWeight:700,color:"#f8f0d8",marginBottom:8}},"Connection failed"),
      e("div",{style:{fontSize:13,color:"#4a6fa5",marginBottom:16}},error),
      e("button",{style:{...S.btn(),width:"100%"},onClick:()=>window.location.reload()},"Retry")
    )
  );

  // Computed
  const acqExp    =expenses.filter(ex=>ACQUISITION_CATEGORIES.includes(ex.category));
  const rehabExp  =expenses.filter(ex=>REHAB_CATEGORIES.includes(ex.category));
  const acqSpent  =acqExp.reduce((s,ex)=>s+parseFloat(ex.amount||0),0);
  const rehabSpent=rehabExp.reduce((s,ex)=>s+parseFloat(ex.amount||0),0);
  const pp        =parseFloat(activeProject?.purchasePrice)||0;
  const rb        =parseFloat(activeProject?.rehabBudget)||0;
  const dpAmt     =parseFloat(expenses.find(ex=>ex.category==="Down Payment")?.amount||0);
  const loanAmt   =Math.max(0,pp-dpAmt);
  const totalCost =pp+rb;
  const rehabRem  =rb-rehabSpent;
  const rehabPct  =rb>0?Math.min(100,(rehabSpent/rb)*100):0;
  const over      =rehabRem<0;
  const acqByCat  =ACQUISITION_CATEGORIES.map(c=>({name:c,total:acqExp.filter(ex=>ex.category===c).reduce((s,ex)=>s+parseFloat(ex.amount||0),0)})).filter(c=>c.total>0);

        :acqByCat.map(c=>e("div",{key:c.name,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1e3a5f"}},
            e("span",{style:{display:"flex",alignItems:"center",gap:7,fontSize:13,color:"#cbd5e1"}},
              e("span",{style:{width:8,height:8,borderRadius:"50%",background:CATEGORY_COLORS[c.name]||"#6b7280",flexShrink:0}}),
              c.name
            ),
            e("span",{style:{fontWeight:700,color:"#f8f0d8"}},fmt(c.total))
          )),
      e("div",{style:{fontSize:11,color:"#2a4a7f",marginTop:8,fontStyle:"italic"}},"Excluded from rehab budget.")
    ),

    // Recent
    recent.length>0&&e("div",{style:S.card},
      e("div",{style:{fontSize:13,fontWeight:700,color:"#7a9cc5",marginBottom:12}},"Recent Expenses"),
      ...recent.map(ex=>e("div",{key:ex.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #1e3a5f"}},
        e("div",null,
          e("div",{style:{fontSize:13,color:"#e2e8f0"}},ex.description),
          e("div",{style:{fontSize:11,color:"#4a6fa5",marginTop:2}},ex.category+" · "+fmtDateShort(ex.date))
        ),
        e("span",{style:{fontWeight:700,fontSize:14,color:"#f8f0d8",whiteSpace:"nowrap",marginLeft:8}},fmt(ex.amount))
      ))
    )
  );

  // ── EXPENSES VIEW ──
  const ExpensesView=()=>loadingExp?e("div",{style:{color:"#4a6fa5",padding:20}},"Loading…"):e("div",null,
    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16},className:"page-header"},
      e("h2",{style:{fontWeight:800,fontSize:18,color:"#f8f0d8"}},"All Expenses"),
      e("div",{className:"page-header-actions"},
        e("button",{style:S.btn(),onClick:()=>openAddExpense()},"+ Add Expense")
      )
    ),
    e("div",{style:{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}},
      e("input",{style:{...S.input,maxWidth:220,flex:1},placeholder:"Search…",value:filter.search,onChange:ev=>setFilter({...filter,search:ev.target.value})}),
      e("select",{style:{...S.input,maxWidth:180,flex:1},value:filter.category,onChange:ev=>setFilter({...filter,category:ev.target.value})},
        e("option",{value:""},"All Categories"),
        e("optgroup",{label:"Acquisition"},ACQUISITION_CATEGORIES.map(c=>e("option",{key:c},c))),
        e("optgroup",{label:"Rehab"},REHAB_CATEGORIES.map(c=>e("option",{key:c},c)))
      )
    ),
    filtered.length===0
      ?e("div",{style:{...S.card,textAlign:"center",padding:"36px 16px",color:"#4a6fa5"}},
          e("div",{style:{fontSize:28,marginBottom:8}},"🔍"),
          e("div",{style:{fontWeight:600}},"No expenses found")
        )
      :e("div",null,
          // Desktop table
          e("div",{style:{...S.card,padding:0,overflow:"hidden"},className:"desktop-table"},
            e("table",null,
              e("thead",null,e("tr",null,
                ...["Date","Description","Category","Vendor","Amount",""].map((h,i)=>e("th",{key:i,style:{...S.th,textAlign:h==="Amount"?"right":"left"}},h))
              )),
              e("tbody",null,...filtered.map(ex=>
                e("tr",{key:ex.id,
                  onMouseEnter:ev=>ev.currentTarget.style.background="#0f2548",
                  onMouseLeave:ev=>ev.currentTarget.style.background=""},
                  e("td",{style:S.td},e("span",{style:{fontSize:12,color:"#4a6fa5",whiteSpace:"nowrap"}},fmtDate(ex.date))),
                  e("td",{style:S.td},
                    e("div",null,ex.description),
                    ex.notes&&e("div",{style:{fontSize:11,color:"#4a6fa5",marginTop:2}},ex.notes)
                  ),
                  e("td",{style:S.td},e("span",{style:S.badge(ex.category)},ex.category)),
                  e("td",{style:{...S.td,color:"#4a6fa5"}},ex.vendor||"—"),
                  e("td",{style:{...S.td,textAlign:"right",fontWeight:700,color:"#f8f0d8",whiteSpace:"nowrap"}},fmt(ex.amount)),
                  e("td",{style:{...S.td,whiteSpace:"nowrap"}},
                    e("button",{style:{background:"none",border:"none",color:"#4a6fa5",cursor:"pointer",padding:"2px 6px",fontSize:13},onClick:()=>openAddExpense(ex)},"✏️"),
                    e("button",{style:{background:"none",border:"none",color:"#4a6fa5",cursor:"pointer",padding:"2px 6px",fontSize:13},onClick:()=>setDelConfirm({type:"expense",id:ex.id,name:ex.description})},"🗑️")
                  )
                )
              ))
            )
          ),
          // Mobile cards
          e("div",{className:"mobile-cards"},
            ...filtered.map(ex=>e("div",{key:ex.id,style:{...S.card,marginBottom:10}},
              e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
                e("div",{style:{flex:1}},
                  e("div",{style:{fontWeight:600,color:"#f8f0d8",fontSize:14}},ex.description),
                  ex.notes&&e("div",{style:{fontSize:11,color:"#4a6fa5",marginTop:2}},ex.notes)
                ),
                e("div",{style:{fontWeight:800,fontSize:16,color:"#f8f0d8",marginLeft:8,whiteSpace:"nowrap"}},fmt(ex.amount))
              ),
              e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}},
                e("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
                  e("span",{style:S.badge(ex.category)},ex.category),
                  e("span",{style:{fontSize:12,color:"#4a6fa5"}},fmtDateShort(ex.date)),
                  ex.vendor&&e("span",{style:{fontSize:12,color:"#4a6fa5"}},ex.vendor)
                ),
                e("div",{style:{display:"flex",gap:4}},
                  e("button",{style:{background:"#1e3a5f",border:"none",color:"#7a9cc5",cursor:"pointer",padding:"5px 10px",borderRadius:6,fontSize:12},onClick:()=>openAddExpense(ex)},"Edit"),
                  e("button",{style:{background:"#ef444415",border:"none",color:"#ef4444",cursor:"pointer",padding:"5px 10px",borderRadius:6,fontSize:12},onClick:()=>setDelConfirm({type:"expense",id:ex.id,name:ex.description})},"Delete")
                )
              )
            ))
          )
        )
  );

  // ── TASKS VIEW ──
  const taskStatusOrder={"To Do":0,"In Progress":1,"Blocked":2,"Done":3};
  const filteredTasks=tasks.filter(t=>!taskFilter||t.status===taskFilter)
    .sort((a,b)=>(taskStatusOrder[a.status]||0)-(taskStatusOrder[b.status]||0));

  const TasksView=()=>loadingTasks?e("div",{style:{color:"#4a6fa5",padding:20}},"Loading…"):e("div",null,
    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16},className:"page-header"},
      e("div",null,
        e("h2",{style:{fontWeight:800,fontSize:18,color:"#f8f0d8"}},"Tasks"),
        e("p",{style:{color:"#4a6fa5",fontSize:13,marginTop:3}},tasks.length+" task"+(tasks.length!==1?"s":"")+" · "+tasks.filter(t=>t.status==="Done").length+" done")
      ),
      e("div",{className:"page-header-actions"},
        e("button",{style:S.btn(),onClick:()=>openAddTask()},"+ Add Task")
      )
    ),
    e("div",{style:{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}},
      e("button",{style:{padding:"6px 14px",borderRadius:99,fontSize:12,fontWeight:600,border:"1px solid "+(taskFilter===""?"#d4a017":"#1e3a5f"),background:taskFilter===""?"#d4a01722":"transparent",color:taskFilter===""?"#d4a017":"#7a9cc5",cursor:"pointer"},onClick:()=>setTaskFilter("")},"All"),
      ...TASK_STATUSES.map(s=>e("button",{key:s,style:{padding:"6px 14px",borderRadius:99,fontSize:12,fontWeight:600,border:"1px solid "+(taskFilter===s?TASK_STATUS_COLORS[s]:"#1e3a5f"),background:taskFilter===s?TASK_STATUS_COLORS[s]+"22":"transparent",color:taskFilter===s?TASK_STATUS_COLORS[s]:"#7a9cc5",cursor:"pointer"},onClick:()=>setTaskFilter(s)},s))
    ),
    filteredTasks.length===0
      ?e("div",{style:{...S.card,textAlign:"center",padding:"40px 16px",color:"#4a6fa5"}},
          e("div",{style:{fontSize:28,marginBottom:8}},"✅"),
          e("div",{style:{fontWeight:600}},"No tasks yet"),
          e("button",{style:{...S.btn(),marginTop:14},onClick:()=>openAddTask()},"+ Add First Task")
        )
      :e("div",null,...filteredTasks.map(t=>{
          const isDone=t.status==="Done";
          const isOverdue=t.dueDate&&!isDone&&new Date(t.dueDate)<new Date(new Date().toDateString());
          return e("div",{key:t.id,style:{...S.card,marginBottom:10,opacity:isDone?0.65:1,borderColor:isOverdue?"#ef444455":"#1e3a5f"}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:8}},
              e("div",{style:{flex:1}},
                e("div",{style:{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}},
                  t.priority&&e("span",{style:{width:6,height:6,borderRadius:"50%",background:PRIORITY_COLORS[t.priority]||"#6b7280",flexShrink:0}}),
                  e("span",{style:{fontWeight:700,fontSize:14,color:"#f8f0d8",textDecoration:isDone?"line-through":"none"}},t.task)
                ),
                t.notes&&e("div",{style:{fontSize:12,color:"#4a6fa5"}},t.notes)
              ),
              e("button",{
                style:{background:TASK_STATUS_COLORS[t.status||"To Do"]+"22",color:TASK_STATUS_COLORS[t.status||"To Do"],border:"none",borderRadius:99,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"},
                onClick:()=>cycleStatus(t)
              },t.status||"To Do")
            ),
            e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginTop:6}},
              e("div",{style:{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",fontSize:12,color:"#4a6fa5"}},
                t.category&&e("span",{style:{background:"#1e3a5f",padding:"2px 8px",borderRadius:99,fontSize:11,color:"#7a9cc5"}},t.category),
                t.assignee&&e("span",null,"👤 "+t.assignee),
                t.dueDate&&e("span",{style:{color:isOverdue?"#ef4444":"#4a6fa5",fontWeight:isOverdue?700:400}},(isOverdue?"⚠️ ":"📅 ")+fmtDateShort(t.dueDate))
              ),
              e("div",{style:{display:"flex",gap:4}},
                e("button",{style:{background:"#1e3a5f",border:"none",color:"#7a9cc5",cursor:"pointer",padding:"5px 10px",borderRadius:6,fontSize:12},onClick:()=>openAddTask(t)},"Edit"),
                e("button",{style:{background:"#ef444415",border:"none",color:"#ef4444",cursor:"pointer",padding:"5px 10px",borderRadius:6,fontSize:12},onClick:()=>setDelConfirm({type:"task",id:t.id,name:t.task})},"Delete")
              )
            )
          );
        }))
  );

  // ── QUOTES VIEW ──
  const quoteGroups = {};
  quotes.forEach(q=>{
    const key=q.item||"Other";
    if(!quoteGroups[key]) quoteGroups[key]=[];
    quoteGroups[key].push(q);
  });
  const groupNames = Object.keys(quoteGroups).sort();

  const QuotesView=()=>loadingQuotes?e("div",{style:{color:"#4a6fa5",padding:20}},"Loading…"):e("div",null,
    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16},className:"page-header"},
      e("div",null,
        e("h2",{style:{fontWeight:800,fontSize:18,color:"#f8f0d8"}},"Quotes"),
        e("p",{style:{color:"#4a6fa5",fontSize:13,marginTop:3}},quotes.length+" quote"+(quotes.length!==1?"s":"")+" across "+groupNames.length+" item"+(groupNames.length!==1?"s":""))
      ),
      e("div",{className:"page-header-actions"},
        e("button",{style:S.btn(),onClick:()=>openAddQuote()},"+ Add Quote")
      )
    ),
    groupNames.length===0
      ?e("div",{style:{...S.card,textAlign:"center",padding:"40px 16px",color:"#4a6fa5"}},
          e("div",{style:{fontSize:28,marginBottom:8}},"💬"),
          e("div",{style:{fontWeight:600}},"No quotes yet"),
          e("p",{style:{fontSize:12,marginTop:6,marginBottom:14}},"Add quotes from different vendors to compare before deciding."),
          e("button",{style:S.btn(),onClick:()=>openAddQuote()},"+ Add First Quote")
        )
      :e("div",null,...groupNames.map(groupName=>{
          const groupQuotes=quoteGroups[groupName].sort((a,b)=>a.amount-b.amount);
          const accepted=groupQuotes.find(q=>q.status==="Accepted");
          const lowestAmt=Math.min(...groupQuotes.map(q=>q.amount));
          return e("div",{key:groupName,style:{marginBottom:22}},
            e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
              e("div",{style:{fontSize:14,fontWeight:700,color:"#f8f0d8"}},groupName),
              accepted&&e("span",{style:{fontSize:11,color:"#10b981",fontWeight:600}},"✓ "+accepted.vendor+" accepted")
            ),
            e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
              ...groupQuotes.map(q=>{
                const isLowest=q.amount===lowestAmt && q.status==="Pending";
                return e("div",{key:q.id,style:{...S.card,padding:"14px 16px",borderColor:q.status==="Accepted"?"#10b981":q.status==="Rejected"?"#1e3a5f":isLowest?"#d4a01755":"#1e3a5f",opacity:q.status==="Rejected"?0.5:1}},
                  e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:8}},
                    e("div",{style:{flex:1}},
                      e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:2}},
                        e("span",{style:{fontWeight:700,fontSize:14,color:"#f8f0d8"}},q.vendor),
                        isLowest&&e("span",{style:{fontSize:10,color:"#d4a017",fontWeight:700,background:"#d4a01722",padding:"1px 7px",borderRadius:99}},"LOWEST")
                      ),
                      q.notes&&e("div",{style:{fontSize:12,color:"#4a6fa5"}},q.notes),
                      e("div",{style:{fontSize:11,color:"#4a6fa5",marginTop:3}},q.category)
                    ),
                    e("div",{style:{textAlign:"right"}},
                      e("div",{style:{fontWeight:800,fontSize:18,color:"#f8f0d8"}},fmt(q.amount)),
                      e("span",{style:{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:99,background:QUOTE_STATUS_COLORS[q.status||"Pending"]+"22",color:QUOTE_STATUS_COLORS[q.status||"Pending"]}},q.status||"Pending")
                    )
                  ),
                  e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
                    q.status==="Pending"&&e("button",{style:{background:"#10b98122",border:"none",color:"#10b981",cursor:"pointer",padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:600},onClick:()=>acceptQuote(q),disabled:saving},"✓ Accept"),
                    q.status==="Pending"&&e("button",{style:{background:"#ef444415",border:"none",color:"#ef4444",cursor:"pointer",padding:"6px 12px",borderRadius:6,fontSize:12},onClick:()=>rejectQuote(q),disabled:saving},"Reject"),
                    e("button",{style:{background:"#1e3a5f",border:"none",color:"#7a9cc5",cursor:"pointer",padding:"6px 12px",borderRadius:6,fontSize:12},onClick:()=>openAddQuote(q)},"Edit"),
                    e("button",{style:{background:"#1e3a5f",border:"none",color:"#7a9cc5",cursor:"pointer",padding:"6px 12px",borderRadius:6,fontSize:12},onClick:()=>setDelConfirm({type:"quote",id:q.id,name:q.vendor+" — "+q.item})},"Delete")
                  )
                );
              })
            )
          );
        }))
  );

  return e("div",{style:S.root},
    e("div",{style:S.header},
      e("div",{style:{fontWeight:800,fontSize:15,color:"#f8f0d8",display:"flex",alignItems:"center",gap:8,cursor:"pointer"},onClick:()=>navTo("home"),className:"header-title"},
        e("div",{style:{width:28,height:28,background:"#1e3a5f",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#d4a017",flexShrink:0}},"N"),
        "NextPhase Ventures"
      ),
      saving&&e("span",{style:{fontSize:12,color:"#d4a017",marginLeft:4}},"Saving…"),
      activeProject&&view!=="home"&&e("div",{style:{marginLeft:"auto"}},
        e("button",{style:{...S.btn(),fontSize:13},onClick:()=>view==="tasks"?openAddTask():view==="quotes"?openAddQuote():openAddExpense()},view==="tasks"?"+ Task":view==="quotes"?"+ Quote":"+ Add")
      )
    ),

    e("div",{style:{display:"flex",flex:1,minHeight:0}},
      e(Sidebar),
      e("div",{style:{...S.content},className:"main-content"},
        view==="home"      ?e(HomeView):
        view==="dashboard" ?e(DashboardView):
        view==="expenses"  ?e(ExpensesView):
        view==="tasks"     ?e(TasksView):
        view==="quotes"    ?e(QuotesView):null
      )
    ),

    e(BottomNav),

    delConfirm&&e("div",{style:{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:16}},
      e("div",{style:{...S.card,maxWidth:360,width:"100%"}},
        e("div",{style:{fontWeight:700,fontSize:16,marginBottom:8,color:"#f8f0d8"}},"Delete "+(delConfirm.type==="project"?"Project":delConfirm.type==="task"?"Task":delConfirm.type==="quote"?"Quote":"Expense")+"?"),
        e("p",{style:{fontSize:13,color:"#4a6fa5",marginBottom:20}},'"'+delConfirm.name+'" will be permanently removed'+(delConfirm.type==="project"?" and all its expenses":"")+"."),
        e("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
          e("button",{style:S.btn("ghost"),onClick:()=>setDelConfirm(null),disabled:saving},"Cancel"),
          e("button",{style:S.btn("danger"),disabled:saving,onClick:()=>delConfirm.type==="project"?deleteProject(delConfirm.id):delConfirm.type==="task"?deleteTask(delConfirm.id):delConfirm.type==="quote"?deleteQuote(delConfirm.id):deleteExpense(delConfirm.id)},saving?"Deleting…":"Delete")
        )
      )
    ),

    toast&&e("div",{style:{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:toast.type==="error"?"#ef4444":"#10b981",color:"#fff",padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:100,boxShadow:"0 4px 20px #0006",whiteSpace:"nowrap"}},toast.msg)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
